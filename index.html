<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<title>付箋マッチング</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #f5f5f5;

  width: 1600px;
  height: 1000px;
}

/* スマホ */
@media (max-width: 600px) {
  body {
    width: 1200px;
    height: 900px;
  }
}

.note {
  position: absolute;
  padding: 14px 18px;
  border-radius: 12px;
  font-size: 18px;
  touch-action: none;
  box-shadow: 0 4px 8px rgba(0,0,0,0.2);

  min-width: 160px;   /* ← 横長にする */
  max-width: 260px;

  white-space: normal;
  overflow-wrap: break-word;
  word-break: normal;
  box-sizing: border-box;
  line-height: 1.4;
}

@media (max-width: 600px) {
  .note {
    font-size: 20px;
    min-width: 180px;
  }
}

.A { background: #fffa8b; }
.B { background: #a0e7ff; }

/* ボタン改善 */
button {
  position: fixed;
  top: 10px;     /* ← 上に移動 */
  left: 10px;
  padding: 12px 16px;
  font-size: 16px;
  z-index: 1000;
}
</style>
</head>

<body>

<button onclick="resetNotes()">reset</button>

<!-- A -->
<div class="note A">こどもをそだてるのは</div>
<div class="note A">あさはやくおきるのは</div>
<div class="note A">だいがくにはいるのは</div>
<div class="note A">サッカーをするのは</div>
<div class="note A">たくさんおさけをのむのは</div>
<div class="note A">うそをつくのは</div>
<div class="note A">チーターははしるのが</div>
<div class="note A">おばあさんはあるくのが</div>
<div class="note A">りょこうにいくのが</div>
<div class="note A">コックはりょうりをつくるのが</div>
<div class="note A">へたですから、うたうのが</div>
<div class="note A">りょうりをつくるのが</div>

<!-- B -->
<div class="note B">たいへんです</div>
<div class="note B">きもちがいいです</div>
<div class="note B">むずかしいです</div>
<div class="note B">たのしいです</div>
<div class="note B">からだにわるいです</div>
<div class="note B">きもちがわるいです</div>
<div class="note B">はやいです</div>
<div class="note B">おそいです</div>
<div class="note B">すきです</div>
<div class="note B">じょうずです</div>
<div class="note B">きらいです</div>
<div class="note B">へたです</div>

<script>
const notes = document.querySelectorAll('.note');

function layoutNotes() {
  const gapY = 90;

  let aIndex = 0;
  let bIndex = 0;

  notes.forEach(note => {

    if (note.classList.contains('A')) {
      note.style.left = 50 + Math.random() * 40 + 'px';
      note.style.top = aIndex * gapY + Math.random() * 20 + 'px';
      aIndex++;
    }

    if (note.classList.contains('B')) {
      note.style.left = 350 + Math.random() * 40 + 'px';
      note.style.top = bIndex * gapY + Math.random() * 20 + 'px';
      bIndex++;
    }

  });
}

// 初期配置
layoutNotes();

// リセット
function resetNotes() {
  layoutNotes();
}

// ドラッグ
notes.forEach(note => {

  let offsetX, offsetY;

  function startMove(x, y) {
    const rect = note.getBoundingClientRect();
    offsetX = x - rect.left;
    offsetY = y - rect.top;
  }

  function moveAt(x, y) {
    note.style.left = (x - offsetX) + 'px';
    note.style.top = (y - offsetY) + 'px';
  }

  note.addEventListener('mousedown', e => {
    startMove(e.pageX, e.pageY);

    function onMove(e) {
      moveAt(e.pageX, e.pageY);
    }

    document.addEventListener('mousemove', onMove);

    document.addEventListener('mouseup', () => {
      document.removeEventListener('mousemove', onMove);
    }, { once: true });
  });

  note.addEventListener('touchstart', e => {
    const t = e.touches[0];
    startMove(t.pageX, t.pageY);
  });

  note.addEventListener('touchmove', e => {
    const t = e.touches[0];
    moveAt(t.pageX, t.pageY);
  });

});
</script>

</body>
</html>
